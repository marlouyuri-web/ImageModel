<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine · IA Visual</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:      #07080d;
      --surface: #0e1018;
      --card:    #12141f;
      --card2:   #181b28;
      --a1:      #6ee7f7;
      --a2:      #b57bee;
      --a3:      #f7c948;
      --a4:      #f76e8c;
      --text:    #dde2f0;
      --muted:   #555c78;
      --border:  rgba(110,231,247,.12);
      --glow-c:  rgba(110,231,247,.18);
      --radius:  1rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .025; pointer-events: none; z-index: 0;
    }

    .aurora { position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite alternate; }
    .aurora-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(110,231,247,.12),transparent 70%);top:-180px;left:10%; }
    .aurora-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(181,123,238,.10),transparent 70%);top:20%;right:-100px;animation-delay:-5s; }
    .aurora-3 { width:350px;height:350px;background:radial-gradient(circle,rgba(247,201,72,.07),transparent 70%);bottom:-120px;left:30%;animation-delay:-9s; }
    @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(30px,20px) scale(1.08)} }

    /* HEADER */
    header { position:relative;z-index:2;padding:3rem 1rem 1.5rem;text-align:center; }

    .pill-tag {
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
      color:var(--a1);background:rgba(110,231,247,.07);border:1px solid rgba(110,231,247,.2);
      padding:.3rem 1rem;border-radius:999px;margin-bottom:1.2rem;
    }
    .pill-tag::before {
      content:'';width:6px;height:6px;border-radius:50%;
      background:var(--a1);box-shadow:0 0 8px var(--a1);
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    h1 {
      font-size:clamp(2rem,6vw,3.6rem);font-weight:800;line-height:1.05;letter-spacing:-.02em;
      background:linear-gradient(130deg,var(--a1) 0%,var(--a2) 60%,var(--a4) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .sub { font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);margin-top:.6rem;letter-spacing:.08em; }

    /* GLASS CARD */
    .glass-card {
      position:relative;z-index:2;
      background:var(--card);border:1px solid var(--border);border-radius:1.5rem;overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 25px 70px rgba(0,0,0,.6),0 0 60px var(--glow-c);
    }
    .card-top-bar { height:3px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a4),transparent); }

    /* IMAGE PREVIEW */
    .img-wrap {
      position:relative;background:var(--surface);border-radius:var(--radius);
      aspect-ratio:1/1;overflow:hidden;border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:border-color .3s;
    }
    .img-wrap:hover { border-color:rgba(110,231,247,.35); }

    .cam-corner {
      position:absolute;width:22px;height:22px;
      border-color:var(--a1);border-style:solid;border-width:0;opacity:.6;z-index:3;
      transition:opacity .3s;
    }
    .cam-corner.tl{top:10px;left:10px;border-top-width:2px;border-left-width:2px}
    .cam-corner.tr{top:10px;right:10px;border-top-width:2px;border-right-width:2px}
    .cam-corner.bl{bottom:10px;left:10px;border-bottom-width:2px;border-left-width:2px}
    .cam-corner.br{bottom:10px;right:10px;border-bottom-width:2px;border-right-width:2px}

    /* drop zone placeholder */
    .drop-placeholder {
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.6rem;text-align:center;padding:1.5rem;
      pointer-events:none;
      transition:opacity .3s;
    }
    .drop-placeholder svg { width:52px;height:52px;stroke:var(--muted);opacity:.4; }
    .drop-placeholder p { font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted); }
    .drop-placeholder span { font-size:.6rem;opacity:.5; }

    /* drag-over highlight */
    .img-wrap.dragover { border-color:var(--a1);box-shadow:0 0 0 3px rgba(110,231,247,.15); }
    .img-wrap.dragover .cam-corner { opacity:1; }

    /* preview image */
    #preview-img {
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:contain;display:none;
      background:var(--surface);
    }

    /* analysing overlay */
    #analysing-overlay {
      display:none;position:absolute;inset:0;z-index:5;
      background:rgba(7,8,13,.7);backdrop-filter:blur(4px);
      align-items:center;justify-content:center;flex-direction:column;gap:.8rem;
    }
    .analyse-spinner {
      width:36px;height:36px;
      border:3px solid rgba(110,231,247,.15);
      border-top-color:var(--a1);
      border-radius:50%;
      animation:spin .7s linear infinite;
      box-shadow:0 0 16px var(--a1);
    }
    .analyse-text {
      font-family:'IBM Plex Mono',monospace;font-size:.65rem;
      letter-spacing:.15em;color:var(--a1);
    }

    /* HIDDEN FILE INPUT */
    #file-input { display:none; }

    /* SEC LABEL */
    .sec-label { font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted); }

    /* STATUS */
    .status {
      display:inline-flex;align-items:center;gap:.45rem;
      font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.12em;
      padding:.28rem .8rem;border-radius:999px;
      border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
      color:var(--muted);transition:all .4s;
    }
    .status-dot { width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .4s; }
    .status.ready { color:var(--a3);border-color:rgba(247,201,72,.25);background:rgba(247,201,72,.06); }
    .status.ready .status-dot { background:var(--a3);box-shadow:0 0 8px var(--a3); }
    .status.done  { color:var(--a1);border-color:rgba(110,231,247,.25);background:rgba(110,231,247,.06); }
    .status.done .status-dot  { background:var(--a1);box-shadow:0 0 8px var(--a1);animation:blink 1.4s ease-in-out infinite; }

    /* BUTTONS */
    .btn-launch {
      width:100%;padding:.9rem 1.5rem;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      border:none;border-radius:var(--radius);
      color:#07080d;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.04em;
      cursor:pointer;transition:transform .18s,box-shadow .18s,opacity .3s;
      box-shadow:0 6px 28px rgba(110,231,247,.3);position:relative;overflow:hidden;
    }
    .btn-launch::after {
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
      transform:translateX(-100%);transition:transform .5s;
    }
    .btn-launch:hover:not(:disabled)::after { transform:translateX(100%); }
    .btn-launch:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 10px 36px rgba(110,231,247,.4); }
    .btn-launch:active:not(:disabled) { transform:translateY(0); }
    .btn-launch:disabled { opacity:.35;cursor:not-allowed; }

    .btn-secondary {
      width:100%;padding:.75rem 1.5rem;
      background:transparent;
      border:1px solid var(--border);border-radius:var(--radius);
      color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;
      cursor:pointer;transition:all .2s;
    }
    .btn-secondary:hover:not(:disabled) { border-color:rgba(110,231,247,.4);color:var(--a1);background:rgba(110,231,247,.05); }
    .btn-secondary:disabled { opacity:.3;cursor:not-allowed; }

    .btn-spinner {
      display:none;width:18px;height:18px;
      border:2px solid rgba(0,0,0,.25);border-top-color:#000;
      border-radius:50%;animation:spin .65s linear infinite;margin:0 auto;
    }
    @keyframes spin { to { transform:rotate(360deg) } }

    /* PREDICTIONS */
    #label-container { display:flex;flex-direction:column;gap:.85rem; }
    #label-container:empty::after {
      content:'Carregue uma imagem para analisar…';display:block;
      font-family:'IBM Plex Mono',monospace;font-size:.72rem;
      color:var(--muted);text-align:center;padding:2.5rem 0;
    }

    .pred-card {
      background:var(--card2);border:1px solid rgba(255,255,255,.05);
      border-radius:.85rem;padding:1rem 1.1rem;transition:border-color .3s,box-shadow .3s;
      animation:fadeUp .3s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .pred-card.top {
      border-color:rgba(110,231,247,.28);
      box-shadow:0 0 24px rgba(110,231,247,.09);
    }

    .pred-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem; }
    .pred-name { font-size:.9rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68%; }
    .pred-pct  { font-family:'IBM Plex Mono',monospace;font-size:.88rem;font-weight:600; }

    /* range */
    .range-wrap { position:relative;padding-bottom:1.1rem; }
    input[type=range] {
      -webkit-appearance:none;appearance:none;
      width:100%;height:7px;border-radius:999px;
      outline:none;cursor:default;pointer-events:none;transition:background .3s;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
      border:2px solid var(--bg);margin-top:-4.5px;transition:box-shadow .3s;
    }
    input[type=range]::-moz-range-thumb {
      width:16px;height:16px;border-radius:50%;border:2px solid var(--bg);
    }
    .conf-row { display:flex;justify-content:space-between;align-items:center;margin-top:.35rem; }
    .conf-label { font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase; }
    .tick-row { display:flex;justify-content:space-between;padding:0 1px;margin-top:.2rem; }
    .tick { width:1px;height:5px;border-radius:1px;background:rgba(255,255,255,.1); }

    /* FOOTER */
    footer {
      position:relative;z-index:2;text-align:center;padding:2.5rem 1rem 3rem;
      font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.12em;
    }
    footer a { color:var(--a1);text-decoration:none; }
    footer a:hover { text-decoration:underline; }

    /* FILE NAME TAG */
    .file-tag {
      display:none;align-items:center;gap:.4rem;
      font-family:'IBM Plex Mono',monospace;font-size:.6rem;
      color:var(--muted);background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:999px;padding:.2rem .7rem;
      max-width:100%;overflow:hidden;
    }
    .file-tag span { white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  </style>
</head>
<body>

<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>
<div class="aurora aurora-3"></div>

<!-- HEADER -->
<header class="container-fluid">
  <div class="pill-tag">IA · Classificação de Imagem</div>
  <h1>Teachable Machine</h1>
  <p class="sub">// faça upload de uma imagem para analisar</p>
</header>

<!-- MAIN -->
<main class="container pb-5" style="position:relative;z-index:2;max-width:980px;">
  <div class="glass-card">
    <div class="card-top-bar"></div>
    <div class="p-3 p-md-4">
      <div class="row g-4 align-items-start">

        <!-- LEFT: upload -->
        <div class="col-12 col-md-6">

          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="sec-label">Imagem</span>
            <span class="status" id="status-badge">
              <span class="status-dot"></span>
              <span id="status-text">AGUARDANDO</span>
            </span>
          </div>

          <!-- drop / preview zone -->
          <div class="img-wrap mb-2" id="drop-zone" onclick="triggerFile()">
            <div class="cam-corner tl"></div>
            <div class="cam-corner tr"></div>
            <div class="cam-corner bl"></div>
            <div class="cam-corner br"></div>

            <div class="drop-placeholder" id="drop-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.2" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor"/>
                <polyline points="17 8 12 3 7 8" stroke="currentColor"/>
                <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor"/>
              </svg>
              <p>Arraste uma imagem aqui</p>
              <span>ou clique para selecionar</span>
            </div>

            <img id="preview-img" alt="preview"/>

            <!-- analysing overlay -->
            <div id="analysing-overlay">
              <div class="analyse-spinner"></div>
              <span class="analyse-text">ANALISANDO</span>
            </div>
          </div>

          <!-- file name tag -->
          <div class="file-tag mb-3" id="file-tag">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            <span id="file-name">—</span>
          </div>

          <!-- hidden file input -->
          <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])"/>

          <!-- load model button -->
          <button class="btn-launch mb-2" id="btn-load" onclick="loadModel()">
            <span id="btn-label">⚡&ensp;Carregar Modelo</span>
            <div class="btn-spinner" id="btn-spinner"></div>
          </button>

          <!-- upload button -->
          <button class="btn-secondary" id="btn-upload" onclick="triggerFile()" disabled>
            📂&ensp;Selecionar Imagem
          </button>
        </div>

        <!-- RIGHT: predictions -->
        <div class="col-12 col-md-6">
          <p class="sec-label mb-3">Predições</p>
          <div id="label-container"></div>
        </div>

      </div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  Powered by&nbsp;
  <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a>
  &nbsp;&amp;&nbsp;
  <a href="https://www.tensorflow.org/js" target="_blank">TensorFlow.js</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/IPFaZYJpW0/";
  let model = null;
  let maxPredictions = 0;

  const PALETTE = [
    { color:'#6ee7f7', glow:'rgba(110,231,247,.5)' },
    { color:'#b57bee', glow:'rgba(181,123,238,.5)' },
    { color:'#f7c948', glow:'rgba(247,201,72,.5)'  },
    { color:'#f76e8c', glow:'rgba(247,110,140,.5)' },
    { color:'#6ef7b5', glow:'rgba(110,247,181,.5)' },
    { color:'#f79c6e', glow:'rgba(247,156,110,.5)' },
  ];

  function confLabel(pct) {
    if (pct >= 80) return 'ALTA ▲';
    if (pct >= 45) return 'MÉDIA ◆';
    if (pct >= 15) return 'BAIXA ▼';
    return 'MÍNIMA ·';
  }

  function injectThumbStyle(i, p) {
    const s = document.createElement('style');
    s.textContent = `
      #range-${i}::-webkit-slider-thumb { background:${p.color}; box-shadow:0 0 10px ${p.glow}; }
      #range-${i}::-moz-range-thumb     { background:${p.color}; box-shadow:0 0 10px ${p.glow}; }
    `;
    document.head.appendChild(s);
  }

  function buildTicks(n) {
    return Array(n).fill('<div class="tick"></div>').join('');
  }

  /* ── drag & drop ── */
  const dropZone = document.getElementById('drop-zone');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function triggerFile() {
    if (!model) return;
    document.getElementById('file-input').click();
  }

  /* ── load model ── */
  async function loadModel() {
    const btn    = document.getElementById('btn-load');
    const label  = document.getElementById('btn-label');
    const spinner = document.getElementById('btn-spinner');

    label.style.display   = 'none';
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      /* status → ready */
      const badge = document.getElementById('status-badge');
      badge.className = 'status ready';
      document.getElementById('status-text').textContent = 'PRONTO';

      /* enable upload */
      document.getElementById('btn-upload').disabled = false;
      dropZone.style.cursor = 'pointer';

      /* button feedback */
      spinner.style.display = 'none';
      label.textContent = '✓ Modelo Carregado';
      label.style.display = 'block';
      btn.style.background = 'linear-gradient(135deg,#6ef7b5,#6ee7f7)';

      /* build empty prediction cards */
      buildPredictionCards();

    } catch(err) {
      console.error(err);
      spinner.style.display = 'none';
      label.textContent = '⚠ Erro — Tentar novamente';
      label.style.display = 'block';
      btn.disabled = false;
    }
  }

  function buildPredictionCards() {
    const container = document.getElementById('label-container');
    container.innerHTML = '';
    for (let i = 0; i < maxPredictions; i++) {
      const p = PALETTE[i % PALETTE.length];
      container.insertAdjacentHTML('beforeend', `
        <div class="pred-card" id="pred-${i}">
          <div class="pred-header">
            <span class="pred-name" id="name-${i}">—</span>
            <span class="pred-pct" id="pct-${i}" style="color:${p.color}">—</span>
          </div>
          <div class="range-wrap">
            <input type="range" id="range-${i}" min="0" max="100" value="0"
              style="background:rgba(255,255,255,.07)"/>
            <div class="conf-row">
              <div class="tick-row">${buildTicks(11)}</div>
              <span class="conf-label" id="conf-${i}">—</span>
            </div>
          </div>
        </div>
      `);
      injectThumbStyle(i, p);
    }
  }

  /* ── handle uploaded image ── */
  async function handleFile(file) {
    if (!model || !file) return;

    /* show file tag */
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-tag').style.display = 'inline-flex';

    /* show preview */
    const reader = new FileReader();
    reader.onload = async (e) => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('drop-placeholder').style.display = 'none';

      /* show analysing overlay */
      const overlay = document.getElementById('analysing-overlay');
      overlay.style.display = 'flex';

      /* wait for image to load then predict */
      img.onload = async () => {
        await predict(img);
        overlay.style.display = 'none';

        /* status → done */
        const badge = document.getElementById('status-badge');
        badge.className = 'status done';
        document.getElementById('status-text').textContent = 'ANALISADO';
      };
    };
    reader.readAsDataURL(file);
  }

  async function predict(imgElement) {
    const prediction = await model.predict(imgElement);

    let topIdx = 0;
    prediction.forEach((p, i) => { if (p.probability > prediction[topIdx].probability) topIdx = i; });

    for (let i = 0; i < maxPredictions; i++) {
      const pct      = prediction[i].probability * 100;
      const pctFixed = pct.toFixed(1);
      const p        = PALETTE[i % PALETTE.length];

      document.getElementById(`name-${i}`).textContent = prediction[i].className;
      document.getElementById(`pct-${i}`).textContent  = pctFixed + '%';
      document.getElementById(`conf-${i}`).textContent = confLabel(pct);

      const range = document.getElementById(`range-${i}`);
      range.value = pctFixed;
      range.style.background =
        `linear-gradient(90deg, ${p.color} ${pctFixed}%, rgba(255,255,255,.07) ${pctFixed}%)`;

      document.getElementById(`pred-${i}`).classList.toggle('top', i === topIdx);
    }
  }
</script>
</body>
</html>
